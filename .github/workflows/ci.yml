name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # The test suite needs nothing here: it boots its own PostgreSQL 15 via
    # embedded-postgres on a random port, and sessions live in Postgres rather
    # than Redis. This container exists solely as a shadow database for the
    # migration-drift check below, which needs CREATE DATABASE rights — so it
    # cannot use Supabase, and cannot borrow the suite's cluster either (that
    # one is torn down before this step runs).
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Verify schema and migrations have not drifted
        # The init migration has hand-appended SQL (the CHECK constraint), so
        # schema.prisma and migrations/ can silently diverge without this.
        run: |
          npx prisma migrate diff \
            --from-migrations packages/db/prisma/migrations \
            --to-schema-datamodel packages/db/prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code
        env:
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
